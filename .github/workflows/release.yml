name: Release Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ github.token }}
          config-file: .github/release-please/release-please-config.json
          manifest-file: .github/release-please/.release-please-manifest.json

  improve-release-notes:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    uses: ScottKirvan/.github/.github/workflows/reusable-release-notes.yml@main
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
      project_name: "ReleasePleaseTest"
      project_context: "ReleasePleaseTest is a sandbox repo for testing shared GitHub Actions workflows and release automation patterns."
      header: |
        ## ReleasePleaseTest

        > Sandbox repo for validating shared workflow patterns across the BojuStudio ecosystem.

        ---
      footer: |
        ---
        🐛 [Report an Issue](https://github.com/ScottKirvan/ReleasePleaseTest/issues/new) · 💬 [Discord](https://discord.gg/TN6XJSNK5Y)
    secrets: inherit

  update-changelog-prs:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    uses: ScottKirvan/.github/.github/workflows/reusable-update-changelog-prs.yml@main
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}

  discord-notify:
    needs: [release-please, improve-release-notes]
    if: ${{ needs.release-please.outputs.release_created }}
    uses: ScottKirvan/.github/.github/workflows/reusable-discord-notify.yml@main
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
      project_name: "ReleasePleaseTest"
    secrets: inherit
